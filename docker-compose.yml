services:
  # ── Base de datos ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: activia_trace
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (rate limiting) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Migrations run automatically before uvicorn starts
    command: >
      sh -c "python -m alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # ── Worker de comunicaciones ───────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.main

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  # ── Seed (ejecutar con: docker compose run --rm seed) ─────────────────────
  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    command: python scripts/seed.py
    profiles:
      - seed

volumes:
  postgres_data:
